name: Publish Commit ⚙️

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # check author permissions
  check:
    runs-on: ubuntu-latest
    outputs:
      has-permissions: ${{ steps.checkPermissions.outputs.require-result }}
    steps:
      - name: Check permissions
        id: checkPermissions
        uses: actions-cool/check-user-permission@c21884f3dda18dafc2f8b402fe807ccc9ec1aa5e # v2
        with:
          # require repo write access to trigger the package preview
          require: "write"
  # build and publish the preview package
  publish:
    needs: check
    # publish the preview package only if permissions check passed
    if: needs.check.outputs.has-permissions == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: Install dependencies
        run: bun i
      - name: Build package
        run: bun run build --filter @omnidotdev/rdk
      - name: Publish package
        run: bunx pkg-pr-new publish './packages/rdk'
